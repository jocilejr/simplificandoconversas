<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      color: #075e54;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    input:focus, select:focus { outline: none; border-color: #25d366; }
    .hint { font-size: 10px; color: #999; margin-top: 2px; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #1da851; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .divider { height: 1px; background: #e5e7eb; margin: 16px 0; }
    .login-section { display: none; }
    .login-section.show { display: block; }
    .instance-loading { font-size: 11px; color: #999; margin-top: 6px; }
    .instance-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 11px;
      color: #16a34a;
    }
    .instance-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #16a34a;
    }
    .workspace-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      font-size: 11px;
      color: #15803d;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1><img src="icons/logo-ov.png" width="24" height="24" style="border-radius:4px"> Chatbot Interno Origem Viva</h1>

  <label for="apiUrl">URL da API</label>
  <input type="url" id="apiUrl" placeholder="https://api.seudominio.com">
  <div class="hint">Ex: https://api.seudominio.com</div>

  <div class="divider"></div>

  <div id="loginSection" class="login-section show">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="admin@example.com">

    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="••••••••">

    <button id="loginBtn">Entrar</button>
  </div>

  <div id="loggedSection" class="login-section">
    <div style="font-size:13px; color:#16a34a; font-weight:600;">✓ Conectado</div>

    <label for="workspaceSelect">Workspace</label>
    <select id="workspaceSelect" disabled>
      <option value="">Carregando...</option>
    </select>
    <div id="workspaceStatus"></div>

    <label for="instanceSelect">Instância ativa</label>
    <select id="instanceSelect" disabled>
      <option value="">Selecione um workspace primeiro</option>
    </select>
    <div id="instanceStatus"></div>

    <button id="refreshInstancesBtn" style="background:#075e54; margin-top:8px; padding:6px; font-size:12px;">↻ Atualizar</button>

    <button id="logoutBtn" style="background:#ef4444;">Desconectar</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
