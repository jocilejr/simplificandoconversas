services:
  # ─── PostgreSQL ───
  postgres:
    image: supabase/postgres:15.8.1.085
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - chatbot_pgdata:/var/lib/postgresql/data
      - ./init-roles.sh:/docker-entrypoint-initdb.d/00-init-roles.sh
      - ./init-db.sql:/docker-entrypoint-initdb.d/99-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ─── GoTrue (Auth) ───
  gotrue:
    image: supabase/gotrue:v2.186.0
    restart: always
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable&options=-csearch_path%3Dauth"
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${APP_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: "admin@example.com"
      GOTRUE_SMTP_HOST: "localhost"
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_USER: "no-reply@example.com"
      GOTRUE_SMTP_PASS: "unused"
    networks:
      - internal

  # ─── PostgREST ───
  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: always
    depends_on:
      - postgres
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - internal

  # ─── Supabase Storage ───
  storage:
    image: supabase/storage-api:v1.11.13
    restart: always
    depends_on:
      - postgres
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
      AUTH_JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_ALGORITHM: HS256
    volumes:
      - chatbot_storagedata:/var/lib/storage
    networks:
      - internal

  # ─── Redis (cache para Evolution API) ───
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - chatbot_redis:/data
    networks:
      - internal

  # ─── Evolution API (WhatsApp) ───
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    environment:
      SERVER_URL: ${API_URL}
      SERVER_PORT: "8080"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      WEBHOOK_GLOBAL_URL: http://backend:3001/api/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
    volumes:
      - chatbot_evolution_instances:/evolution/instances
      - chatbot_evolution_store:/evolution/store
    networks:
      - internal

  # ─── Backend Express ───
  backend:
    build: ./backend
    image: simplificando-backend:latest
    restart: always
    depends_on:
      - postgres
      - gotrue
    volumes:
      - chatbot_media:/media-files
    environment:
      PORT: "3001"
      SUPABASE_URL: http://postgrest:3000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GOTRUE_URL: http://gotrue:9999
      STORAGE_URL: http://storage:5000
      EVOLUTION_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_PUBLIC_URL: ${APP_URL}
    networks:
      - internal

  # ─── Nginx (roteamento interno) ───
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - postgrest
      - gotrue
      - storage
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      MEMBER_DOMAIN: ${MEMBER_DOMAIN:-}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./frontend:/usr/share/nginx/html:ro
      - chatbot_media:/usr/share/nginx/media:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatbot-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.chatbot-app.entrypoints=websecure"
      - "traefik.http.routers.chatbot-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatbot-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.chatbot-api.entrypoints=websecure"
      - "traefik.http.routers.chatbot-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatbot-membros.rule=Host(`${MEMBER_DOMAIN}`)"
      - "traefik.http.routers.chatbot-membros.entrypoints=websecure"
      - "traefik.http.routers.chatbot-membros.tls.certresolver=letsencrypt"
      - "traefik.http.services.chatbot-nginx.loadbalancer.server.port=80"
    networks:
      - internal
      - PrincipalNet

networks:
  internal:
    driver: overlay
    attachable: true
  PrincipalNet:
    external: true

volumes:
  chatbot_pgdata:
  chatbot_storagedata:
  chatbot_evolution_instances:
  chatbot_evolution_store:
  chatbot_redis:
  chatbot_media:
