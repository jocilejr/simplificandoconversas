services:
  # ─── PostgreSQL ───
  postgres:
    image: supabase/postgres:15.8.1.085
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-auth-role.sh:/docker-entrypoint-initdb.d/98-init-auth-role.sh
      - ./init-db.sql:/docker-entrypoint-initdb.d/99-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── GoTrue (Auth) ───
  gotrue:
    image: supabase/gotrue:v2.186.0
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${APP_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: "admin@example.com"
      GOTRUE_SMTP_HOST: "localhost"
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_USER: "no-reply@example.com"
      GOTRUE_SMTP_PASS: "unused"

  # ─── PostgREST ───
  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ─── Supabase Storage ───
  storage:
    image: supabase/storage-api:v1.11.13
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
      AUTH_JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_ALGORITHM: HS256
    volumes:
      - storagedata:/var/lib/storage

  # ─── Baileys Service (WhatsApp) ───
  baileys:
    build: ./baileys-service
    restart: always
    environment:
      PORT: "8084"
      WEBHOOK_URL: http://backend:3001/api/webhook
      API_KEY: ${BAILEYS_API_KEY:-baileys-local-key}
    volumes:
      - baileys_sessions:/app/sessions

  # ─── Backend Express ───
  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_started
    environment:
      PORT: "3001"
      SUPABASE_URL: http://postgrest:3000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GOTRUE_URL: http://gotrue:9999
      STORAGE_URL: http://storage:5000
      BAILEYS_URL: http://baileys:8084
      BAILEYS_API_KEY: ${BAILEYS_API_KEY:-baileys-local-key}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # ─── Nginx ───
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - postgrest
      - gotrue
      - storage
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.simplificando-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.simplificando-app.entrypoints=websecure"
      - "traefik.http.routers.simplificando-app.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.simplificando-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.simplificando-api.entrypoints=websecure"
      - "traefik.http.routers.simplificando-api.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.simplificando-nginx.loadbalancer.server.port=80"

networks:
  default:
  traefik:
    external: true
    name: web

volumes:
  pgdata:
  storagedata:
  baileys_sessions:
